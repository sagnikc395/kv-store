services:
  node1:
    build: .
    entrypoint: ["/kv-node"]
    command:
      - "--id=1"
      - "--addr=:7001"
      - "--advertise-url=http://node1:7001"
      - "--wal-dir=/data"
      - "--peers=2=http://node2:7002,3=http://node3:7003"
    ports:
      - "7001:7001"
    volumes:
      - node1_data:/data

  node2:
    build: .
    entrypoint: ["/kv-node"]
    command:
      - "--id=2"
      - "--addr=:7002"
      - "--advertise-url=http://node2:7002"
      - "--wal-dir=/data"
      - "--peers=1=http://node1:7001,3=http://node3:7003"
    ports:
      - "7002:7002"
    volumes:
      - node2_data:/data

  node3:
    build: .
    entrypoint: ["/kv-node"]
    command:
      - "--id=3"
      - "--addr=:7003"
      - "--advertise-url=http://node3:7003"
      - "--wal-dir=/data"
      - "--peers=1=http://node1:7001,2=http://node2:7002"
    ports:
      - "7003:7003"
    volumes:
      - node3_data:/data

  proxy:
    build: .
    entrypoint: ["/kv-proxy"]
    command:
      - "--addr=:8000"
      - "--nodes=http://node1:7001,http://node2:7002,http://node3:7003"
    ports:
      - "8000:8000"
    depends_on:
      - node1
      - node2
      - node3

volumes:
  node1_data:
  node2_data:
  node3_data:
